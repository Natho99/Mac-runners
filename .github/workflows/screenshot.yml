name: Mac UI Screenshot
on: 
  workflow_dispatch:

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download PKG
        run: |
          # PASTE YOUR COPIED DIRECT LINK INSIDE THE QUOTES BELOW
          curl -L "https://limewire.com/d/53YiD#LsNsutO8xg" -o 4G_Workbench.pkg

      - name: Install the App
        run: |
          # Verify the file is not just a tiny HTML file
          ls -lh 4G_Workbench.pkg
          sudo installer -pkg 4G_Workbench.pkg -target /

      - name: Identify and Launch App
        run: |
          # List apps to log for debugging
          ls /Applications
          
          # This command looks for anything new in /Applications and tries to open it
          # It prioritizes your app name but falls back to anything .app
          open -a "4G_Workbench" || open -a "4G Workbench" || open /Applications/4G*.app || open /Applications/*.app
          
          # Wait 45 seconds for the UI to load
          sleep 45

      - name: Capture Screenshot
        run: |
          # -x means 'do not play camera shutter sound'
          screencapture -x screenshot.png

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
