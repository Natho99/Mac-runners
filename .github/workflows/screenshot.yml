name: Mac UI Screenshot
on: 
  workflow_dispatch:

# Fixes the Node.js warning by forcing the newer version
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download PKG from Google Drive (Bypass Warning)
        run: |
          # This script handles the "large file" confirmation from Google Drive
          FILE_ID="1oBnf5DaTD1oVOxCHnpNtJPlEOSz7O-zI"
          CONFIRM=$(curl -sc /tmp/gcookie "https://drive.google.com/uc?export=download&id=${FILE_ID}" | grep -o 'confirm=[^&]*' | sed 's/confirm=//')
          curl -Lb /tmp/gcookie "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o 4G_Workbench.pkg

      - name: Install the App
        run: |
          # Verify file exists before installing
          if [ ! -f 4G_Workbench.pkg ]; then echo "Download failed"; exit 1; fi
          sudo installer -pkg 4G_Workbench.pkg -target /

      - name: Launch App and Capture Screenshot
        run: |
          # Give the system a second to register the new app
          sleep 5
          
          # Launch the app. We use the '&' to run it in background so the script continues
          open -a "4G_Workbench" &
          
          # Wait 40 seconds for the UI to fully load
          sleep 40
          
          # Capture the screenshot
          screencapture -x screenshot.png

      - name: Upload Screenshot Result
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
