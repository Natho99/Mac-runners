name: Mac UI Screenshot
on: 
  workflow_dispatch:

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download PKG
        run: |
          curl -L "https://pixeldrain.com/api/file/rGyW2rBh" -o 4G_Workbench.pkg

      - name: Fix Permissions and Install
        run: |
          # 1. Move the file to a standard location and set permissions
          chmod +x 4G_Workbench.pkg
          
          # 2. Remove the "quarantine" flag that prevents installing web-downloaded files
          sudo xattr -rd com.apple.quarantine 4G_Workbench.pkg || true
          
          # 3. Use the absolute path for the installer (Fixes the "invalid path" error)
          sudo installer -pkg "$(pwd)/4G_Workbench.pkg" -target /

      - name: Identify and Launch App
        run: |
          # Give it a moment to finish background setup
          sleep 5
          ls /Applications
          
          # Launch the app
          open -a "4G_Workbench" || open -a "4G Workbench" || open /Applications/4G*.app || open /Applications/*.app || echo "Launch failed"
          
          # Wait 50 seconds for UI to render
          sleep 50

      - name: Capture Screenshot
        run: |
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
