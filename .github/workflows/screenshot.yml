name: Mac UI Screenshot
on: 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Download PKG from PixelDrain
        run: |
          # Using the PixelDrain API for a direct download
          curl -L "https://pixeldrain.com/api/file/rGyW2rBh" -o 4G_Workbench.pkg

      - name: Verify and Install
        run: |
          # Check the file size - should be much larger than 53K now!
          ls -lh 4G_Workbench.pkg
          
          # Check if it's a valid installer
          if file 4G_Workbench.pkg | grep -q "HTML"; then
            echo "ERROR: Downloaded an HTML page. Check your link."
            exit 1
          fi
          
          # Run the installer
          sudo installer -pkg 4G_Workbench.pkg -target /

      - name: Identify and Launch App
        run: |
          # Log the Applications folder so you can see the exact name in the logs
          ls /Applications
          
          # Try to launch using various common naming patterns
          open -a "4G_Workbench" || open -a "4G Workbench" || open /Applications/4G*.app || open /Applications/*.app || echo "Could not launch app"
          
          # Wait 50 seconds for the GUI to fully load on the virtual Mac
          sleep 50

      - name: Capture Screenshot
        run: |
          # Take the screenshot and name it screenshot.png
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
