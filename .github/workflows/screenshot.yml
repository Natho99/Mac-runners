name: Mac UI Screenshot
on: 
  workflow_dispatch:

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download PKG
        run: |
          curl -L "https://pixeldrain.com/api/file/rGyW2rBh" -o /tmp/4G_Workbench.pkg

      - name: Install and Open
        run: |
          # 1. Clear all security blocks
          sudo xattr -cr /tmp/4G_Workbench.pkg || true
          
          # 2. Use 'open' instead of 'installer'. 
          # This triggers the macOS installation UI process in the background.
          open /tmp/4G_Workbench.pkg
          
          # 3. Give the installer 30 seconds to start up
          sleep 30
          
          # 4. Check if the app appeared in /Applications automatically
          # Some installers just copy the app; others need a "Finish" click.
          # If it's not there, we'll try to find where it went.
          ls /Applications

      - name: Force Launch and Screenshot
        run: |
          # Try to launch the app by name or by searching the folder
          open -a "4G_Workbench" || open /Applications/4G*.app || open /Applications/*.app || echo "Launch failed"
          
          # Wait 60 seconds (generous time for the UI to paint)
          sleep 60
          
          # Capture everything
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
