name: Mac UI Screenshot
on: 
  workflow_dispatch:

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download PKG
        run: |
          # Download and force the name to app.pkg in the /tmp directory
          curl -L "https://pixeldrain.com/api/file/rGyW2rBh" -o /tmp/app.pkg

      - name: Fix Permissions and Install
        run: |
          # 1. Ensure the file exists and is readable
          ls -lh /tmp/app.pkg
          
          # 2. Strip quarantine and set permissions
          sudo xattr -rd com.apple.quarantine /tmp/app.pkg || true
          chmod 777 /tmp/app.pkg
          
          # 3. Install from the /tmp directory (bypass GitHub workspace restrictions)
          sudo installer -pkg /tmp/app.pkg -target /

      - name: Identify and Launch App
        run: |
          sleep 5
          # Look for the app and launch it
          open -a "4G_Workbench" || open -a "4G Workbench" || open /Applications/4G*.app || open /Applications/*.app || echo "Launch failed"
          
          # Wait 50 seconds for UI to render
          sleep 50

      - name: Capture Screenshot
        run: |
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
