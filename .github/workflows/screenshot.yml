name: Mac UI Screenshot
on: 
  workflow_dispatch:

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download PKG
        run: |
          # Use -f to force and -s to stay silent, but -S to show errors
          curl -fLsS "https://pixeldrain.com/api/file/rGyW2rBh" -o /tmp/app.pkg

      - name: Fix Permissions and Install
        run: |
          # 1. Clean the file flags
          sudo xattr -cr /tmp/app.pkg || true
          
          # 2. Check the file type (This will tell us in the logs what it actually is)
          file /tmp/app.pkg
          
          # 3. Try to expand the package first (This often bypasses "invalid path" errors)
          # If this fails, it means the .pkg itself is corrupted or not a flat package.
          pkgutil --check-signature /tmp/app.pkg || echo "Signature check failed, proceeding anyway..."
          
          # 4. Use the absolute path with a direct stream install
          sudo installer -pkg /tmp/app.pkg -target / -verboseR

      - name: Identify and Launch App
        run: |
          sleep 10
          ls /Applications
          # Find the app and open it
          open -a "4G_Workbench" || open -a "4G Workbench" || open /Applications/4G*.app || open /Applications/*.app || echo "Launch failed"
          
          sleep 50

      - name: Capture Screenshot
        run: |
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
