name: Mac UI Screenshot
on: 
  workflow_dispatch:

jobs:
  capture:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download PKG
        run: |
          curl -L "https://pixeldrain.com/api/file/rGyW2rBh" -o /tmp/app.pkg

      - name: Force Extract App
        run: |
          # 1. Expand the PKG into a temporary folder
          pkgutil --expand-full /tmp/app.pkg /tmp/expanded
          
          # 2. Find the .app folder and move it to /Applications
          # We look in the Payload or scripts folder (standard PKG structure)
          find /tmp/expanded -name "*.app" -exec sudo cp -R {} /Applications/ \;
          
          # 3. List applications to verify it moved
          ls /Applications

      - name: Launch and Screenshot
        run: |
          # Launch whatever was just moved to Applications
          open /Applications/*.app || echo "Launch failed"
          
          # Wait 60 seconds for the UI to fully load
          sleep 60
          
          # Capture the screen
          screencapture -x screenshot.png

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4G-Workbench-UI
          path: screenshot.png
